      - name: wait-for-postgres
        image: busybox:1.32
        command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done;']
      - name: wait-for-redis
        image: busybox:1.32
        command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done;']
      containers:
      - name: agent-service
        image: finrag4j/agent-service:1.0.0
        ports:
        - containerPort: 8086
        env:
        - name: NACOS_HOST
          value: "nacos"
        - name: POSTGRES_HOST
          value: "postgres"
        - name: REDIS_HOST
          value: "redis"
        - name: ROCKETMQ_HOST
          value: "rocketmq-namesrv"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8084
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8084
          initialDelaySeconds: 30
          periodSeconds: 5

---
# Agent Service
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: finrag4j
spec:
  selector:
    app: agent-service
  ports:
  - port: 8086
    targetPort: 8086

---
# ========================================
# 第4层: 前端服务
# ========================================

# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: finrag4j
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
      - name: wait-for-gateway
        image: busybox:1.32
        command: ['sh', '-c', 'until nc -z gateway 8080; do echo waiting for gateway; sleep 2; done;']
      containers:
      - name: frontend
        image: finrag4j/frontend:1.0.0
        ports:
        - containerPort: 80
        env:
        - name: VUE_APP_API_BASE_URL
          value: "http://gateway:8080/api"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 5

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: finrag4j
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finrag4j-ingress
  namespace: finrag4j
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: finrag4j.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8085
