# FinRag4j 完整服务配置
# 通过 include 方式包含基础中间件配置
# 启动: docker-compose up -d (自动加载 .env 文件)
# 版本: Docker Compose 3.8+ (支持 include 语法)

include:
  - ./docker-compose-base.yml

services:
  # Python预处理服务
  python-service:
    build:
      context: ../backend/finrag4j-python
      dockerfile: Dockerfile
    container_name: ${PYTHON_CONTAINER_NAME:-finrag4j-python}
    env_file: .env
    ports:
      - "${PYTHON_SERVICE_PORT:-8001}:8001"
    networks:
      - finrag4j-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PYTHON_SERVICE_PORT:-8001}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Java主服务
  java-service:
    build:
      context: ../backend/finrag4j-java
      dockerfile: Dockerfile
    container_name: ${JAVA_CONTAINER_NAME:-finrag4j-java}
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://192.168.222.1:11434}
    ports:
      - "${JAVA_SERVICE_PORT:-8080}:8080"
    networks:
      - finrag4j-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${JAVA_SERVICE_PORT:-8080}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      python-service:
        condition: service_healthy

  # 前端服务
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ${FRONTEND_CONTAINER_NAME:-finrag4j-frontend}
    env_file: .env
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - finrag4j-network
    depends_on:
      java-service:
        condition: service_healthy
    restart: unless-stopped