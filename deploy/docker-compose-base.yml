# FinRag4j 基础中间件服务（供include使用）
# 包含: PostgreSQL 17, Redis Stack, MinIO, RocketMQ
# 被 docker-compose.yml 通过 include 引用
# 数据目录: ./data/xxx 本地目录挂载

services:
  # PostgreSQL 17 + PGVector
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ${POSTGRES_CONTAINER_NAME:-finrag4j-postgres}
    env_file: .env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ../backend/finrag4j-java/sql:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - finrag4j-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Stack Server（支持RedisJSON、RedisSearch等模块）
  redis:
    image: redis/redis-stack-server:latest
    container_name: ${REDIS_CONTAINER_NAME:-finrag4j-redis}
    env_file: .env
    volumes:
      - ./data/redis:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - finrag4j-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO
  minio:
    image: minio/minio:latest
    container_name: ${MINIO_CONTAINER_NAME:-finrag4j-minio}
    command: server /data --console-address ":9001"
    env_file: .env
    volumes:
      - ./data/minio:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - finrag4j-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # RocketMQ NameServer
  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: ${ROCKETMQ_NAMESRV_CONTAINER_NAME:-finrag4j-rocketmq-namesrv}
    command: sh mqnamesrv
    user: root
    env_file: .env
    environment:
      # 小内存配置
      - JAVA_OPT=-Xms256m -Xmx512m -Xmn128m
    volumes:
      - ./data/rocketmq/namesrv/logs:/home/rocketmq/logs
    ports:
      - "${ROCKETMQ_NAMESRV_PORT:-9876}:9876"
    networks:
      - finrag4j-network
    healthcheck:
      test: ["CMD-SHELL", "cat /home/rocketmq/logs/namesrv.log | grep -q 'boot success' && exit 0 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  # RocketMQ Broker
  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: ${ROCKETMQ_BROKER_CONTAINER_NAME:-finrag4j-rocketmq-broker}
    command: sh mqbroker -n rocketmq-namesrv:9876 --enable-proxy
    user: root
    env_file: .env
    environment:
      # 小内存配置
      - JAVA_OPT=-Xms512m -Xmx1g -Xmn256m
      - BROKER_ID=0
      - BROKER_NAME=broker-a
      - DEFAULT_TOPIC_QUEUE_NUMS=4
      - AUTO_CREATE_TOPIC_ENABLE=true
      - AUTO_CREATE_GROUP_ENABLE=true
    volumes:
      - ./data/rocketmq/broker/logs:/home/rocketmq/logs
      - ./data/rocketmq/broker/store:/home/rocketmq/store
    ports:
      - "${ROCKETMQ_BROKER_PORT:-10911}:10911"
      - "${ROCKETMQ_BROKER_PORT2:-10909}:10909"
    networks:
      - finrag4j-network
    depends_on:
      rocketmq-namesrv:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    restart: unless-stopped

  # RocketMQ Dashboard（管理控制台）
  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: ${ROCKETMQ_DASHBOARD_CONTAINER_NAME:-finrag4j-rocketmq-dashboard}
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
    ports:
      - "${ROCKETMQ_DASHBOARD_PORT:-8088}:8080"
    networks:
      - finrag4j-network
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Ollama大模型服务（已注释，使用外部固定地址 http://192.168.222.1:11434）
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ${OLLAMA_CONTAINER_NAME:-finrag4j-ollama}
  #   volumes:
  #     - ./data/ollama:/root/.ollama
  #   ports:
  #     - "${OLLAMA_PORT:-11434}:11434"
  #   networks:
  #     - finrag4j-network
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   restart: unless-stopped

networks:
  finrag4j-network:
    driver: bridge
    name: ${NETWORK_NAME:-finrag4j-network}