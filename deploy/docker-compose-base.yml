# FinRag4j 基础中间件服务（供include使用）
# 包含: PostgreSQL 17, Redis Stack, MinIO, RocketMQ, Nacos
# 被 docker-compose.yml 通过 include 引用
# 数据目录: ./data/xxx 本地目录挂载
# 依赖关系: Nacos -> PostgreSQL, RocketMQ Broker -> NameServer

services:
  # ========================================
  # 第1层: 基础服务（无依赖）
  # ========================================

  # PostgreSQL 17 + PGVector
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ${POSTGRES_CONTAINER_NAME:-finrag4j-postgres}
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-nacos}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nacos}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./sql/01_create_nacos_user.sql:/docker-entrypoint-initdb.d/01_create_nacos_user.sql
      - ./sql/02_pg_schema.sql:/docker-entrypoint-initdb.d/02_pg_schema.sql
      - ./sql/03_pg_grant.sql:/docker-entrypoint-initdb.d/03_pg_grant.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - finrag4j-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Redis Stack Server（支持RedisJSON、RedisSearch等模块）
  redis:
    image: redis/redis-stack-server:latest
    container_name: ${REDIS_CONTAINER_NAME:-finrag4j-redis}
    env_file: .env
    volumes:
      - ./data/redis:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - finrag4j-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: ${MINIO_CONTAINER_NAME:-finrag4j-minio}
    command: server /data --console-address ":9001"
    env_file: .env
    volumes:
      - ./data/minio:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - finrag4j-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # RocketMQ NameServer
  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: ${ROCKETMQ_NAMESRV_CONTAINER_NAME:-finrag4j-rocketmq-namesrv}
    command: sh mqnamesrv
    user: root
    env_file: .env
    environment:
      - JAVA_OPT_EXT=${ROCKETMQ_NAMESRV_JAVA_OPT:-Xms128m -Xmx256m -Xmn64m -XX:MetaspaceSize=64m -XX:MaxMetaspaceSize=128m}
    volumes:
      - ./data/rocketmq/namesrv/logs:/home/rocketmq/logs
    ports:
      - "${ROCKETMQ_NAMESRV_PORT:-9876}:9876"
    networks:
      - finrag4j-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep java || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${ROCKETMQ_NAMESRV_MEMORY_LIMIT:-384M}
        reservations:
          memory: ${ROCKETMQ_NAMESRV_MEMORY_RESERVE:-128M}
    restart: unless-stopped

  # ========================================
  # 第2层: 依赖型中间件
  # ========================================

  # Nacos 服务注册与配置中心（依赖 PostgreSQL）
  nacos:
    image: nacos/nacos-server:v3.2.2
    container_name: ${NACOS_CONTAINER_NAME:-finrag4j-nacos}
    env_file: .env
    environment:
      - MODE=standalone
      - NACOS_SERVER_PORT=${NACOS_PORT:-8080}
      - JVM_XMS=256m
      - JVM_XMX=512m
      - JVM_XMN=128m
    volumes:
      - ./data/nacos/logs:/home/nacos/logs
      - ./data/nacos/data:/home/nacos/data
      # ★★★ 挂载自定义配置文件（覆盖默认 application.properties）★★★
      - ./nacos-config/application.properties:/home/nacos/conf/application.properties:ro
    ports:
      - "${NACOS_PORT:-8080}:8080"
      - "${NACOS_PORT_8848:-8848}:8848"
      - "${NACOS_PORT_GRPC:-9848}:9848"
      - "${NACOS_PORT_GRPC2:-9849}:9849"
    networks:
      - finrag4j-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${NACOS_PORT:-8080}/nacos/v3/admin/core/state/readiness"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M
    restart: unless-stopped

  # RocketMQ Broker（依赖 NameServer）
  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: ${ROCKETMQ_BROKER_CONTAINER_NAME:-finrag4j-rocketmq-broker}
    command: sh mqbroker -n rocketmq-namesrv:9876 --enable-proxy
    user: root
    env_file: .env
    environment:
      - JAVA_OPT_EXT=${ROCKETMQ_BROKER_JAVA_OPT:-Xms256m -Xmx512m -Xmn128m -XX:MetaspaceSize=128m -XX:MaxMetaspaceSize=256m}
      - BROKER_ID=0
      - BROKER_NAME=broker-a
      - DEFAULT_TOPIC_QUEUE_NUMS=4
      - AUTO_CREATE_TOPIC_ENABLE=true
      - AUTO_CREATE_GROUP_ENABLE=true
    volumes:
      - ./data/rocketmq/broker/logs:/home/rocketmq/logs
      - ./data/rocketmq/broker/store:/home/rocketmq/store
    ports:
      - "${ROCKETMQ_BROKER_PORT:-10911}:10911"
      - "${ROCKETMQ_BROKER_PORT2:-10909}:10909"
    networks:
      - finrag4j-network
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${ROCKETMQ_BROKER_MEMORY_LIMIT:-768M}
        reservations:
          memory: ${ROCKETMQ_BROKER_MEMORY_RESERVE:-256M}
    restart: unless-stopped

  # ========================================
  # 第3层: 辅助服务
  # ========================================

  # RocketMQ Dashboard（依赖 NameServer）
  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: ${ROCKETMQ_DASHBOARD_CONTAINER_NAME:-finrag4j-rocketmq-dashboard}
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
    ports:
      - "${ROCKETMQ_DASHBOARD_PORT:-8088}:8080"
    networks:
      - finrag4j-network
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

networks:
  finrag4j-network:
    driver: bridge
    name: ${NETWORK_NAME:-finrag4j-network}