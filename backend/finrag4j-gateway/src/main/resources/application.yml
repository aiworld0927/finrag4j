server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: finrag4j-gateway
  
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: true
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:public}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
    
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      routes:
        - id: auth-service-auth
          uri: lb://finrag4j-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: auth-service-users
          uri: lb://finrag4j-auth
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

        - id: auth-service-roles
          uri: lb://finrag4j-auth
          predicates:
            - Path=/api/roles/**
          filters:
            - StripPrefix=1

        - id: auth-service-permissions
          uri: lb://finrag4j-auth
          predicates:
            - Path=/api/permissions/**
          filters:
            - StripPrefix=1

        - id: document-service
          uri: lb://finrag4j-document
          predicates:
            - Path=/api/document/**,/api/knowledge-base/**
          filters:
            - StripPrefix=1

        - id: search-service-vector
          uri: lb://finrag4j-search
          predicates:
            - Path=/api/vector/**
          filters:
            - StripPrefix=1

        - id: search-service-rag
          uri: lb://finrag4j-search
          predicates:
            - Path=/api/rag/**
          filters:
            - StripPrefix=1

        - id: agent-service-chat
          uri: lb://finrag4j-agent
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=1

        - id: agent-service-business
          uri: lb://finrag4j-agent
          predicates:
            - Path=/api/agent/**
          filters:
            - StripPrefix=1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
