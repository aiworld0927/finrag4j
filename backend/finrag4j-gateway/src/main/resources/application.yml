server:
  port: 8080

spring:
  cloud:
    gateway:
      # 全局CORS配置
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      # 路由配置 - 使用服务发现
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # Auth认证服务
        - id: auth-service
          uri: lb://finrag4j-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        # Document文档服务
        - id: document-service
          uri: lb://finrag4j-document
          predicates:
            - Path=/api/document/**
          filters:
            - StripPrefix=1

        # Search检索服务
        - id: search-service
          uri: lb://finrag4j-search
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=1

        # Agent服务
        - id: agent-service
          uri: lb://finrag4j-agent
          predicates:
            - Path=/api/agent/**
          filters:
            - StripPrefix=1

  # Redis配置（用于限流）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
