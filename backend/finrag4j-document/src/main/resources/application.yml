server:
  port: 8082

spring:
  application:
    name: finrag4j-document

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:finrag4j_document}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

# MinIO配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: finrag4j-documents

# RocketMQ配置
rocketmq:
  namesrv-addr: ${ROCKETMQ_HOST:localhost}:9876
  producer:
    group: finrag4j-document-producer

# Python服务地址
python-service:
  url: ${PYTHON_SERVICE_URL:http://localhost:8000}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.finrag4j.document.entity
  configuration:
    map-underscore-to-camel-case: true

knife4j:
  enable: true
