server:
  port: 8084

spring:
  application:
    name: finrag4j-agent

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:finrag4j_agent}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: true
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:public}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}

# LangChain4j配置
langchain4j:
  model:
    base-url: ${LLM_BASE_URL:http://localhost:11434}
    api-key: ${LLM_API_KEY:ollama}
    model-name: ${LLM_MODEL_NAME:qwen2.5}

# RocketMQ配置
rocketmq:
  namesrv-addr: ${ROCKETMQ_HOST:localhost}:9876
  producer:
    group: finrag4j-agent-producer

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.finrag4j.agent.entity
  configuration:
    map-underscore-to-camel-case: true

knife4j:
  enable: true
