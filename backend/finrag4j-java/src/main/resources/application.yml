# FinRag4j Java主服务配置文件
# 版本: 1.0.0
# 说明: 基础配置模板，包含开发和生产环境配置
# 环境变量通过.env文件管理，支持 ${ENV_VAR:default} 语法

spring:
  application:
    name: finrag4j-java
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  # 导入.env文件（Spring Boot 3.2+支持）
  config:
    import: optional:file:.env[.properties]
  
  # 数据源配置（使用MyBatis-Plus + Druid连接池）
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:finrag4j}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    # Druid连接池配置
    druid:
      # 初始化时建立物理连接的个数
      initial-size: 5
      # 最小空闲连接数
      min-idle: 5
      # 最大连接池数量
      max-active: 20
      # 获取连接时最大等待时间，单位毫秒
      max-wait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      # 验证连接是否有效
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 打开PSCache，并且指定每个连接上PSCache的大小
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      # 配置监控统计拦截的filters
      filters: stat,wall
      # 通过connectProperties属性来打开mergeSql功能；慢SQL记录
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      # 合并多个DruidDataSource的监控数据
      use-global-data-source-stat: true
  
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          min-idle: 5
          max-idle: 20
          max-active: 50
          max-wait: 3000ms
  
  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
      file-size-threshold: 10MB
  
  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1小时

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.finrag4j.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# MinIO配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:finrag4j}
  upload-path: uploads

# RocketMQ配置
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: finrag4j-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

# Python服务配置
python:
  service:
    base-url: ${PYTHON_SERVICE_BASE_URL:http://localhost:8001}
    connect-timeout: 5000
    read-timeout: 30000
    retry-times: 3
    retry-interval: 1000

# 大模型配置
llm:
  type: ${LLM_TYPE:ollama}
  base-url: ${LLM_BASE_URL:http://localhost:11434}
  default-model: ${LLM_DEFAULT_MODEL:qwen2:7b}
  timeout: 60
  max-retries: 3
  temperature: 0.7
  max-tokens: 2000

# 日志配置
logging:
  level:
    root: INFO
    com.finrag4j: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/finrag4j.log
    max-size: 100MB
    max-history: 30

# Actuator监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh_cn
  production: false

# 应用配置
app:
  name: FinRag4j Java主服务
  version: 1.0.0
  description: 面向金融行业的企业级大模型RAG应用框架

---
# 开发环境配置
spring:
  config:
    activate:
      on-profile: dev
  
  jpa:
    show-sql: true

logging:
  level:
    root: DEBUG
    com.finrag4j: DEBUG

knife4j:
  production: false

---
# 生产环境配置
spring:
  config:
    activate:
      on-profile: prod
  
  jpa:
    show-sql: false

logging:
  level:
    root: INFO
    com.finrag4j: INFO

knife4j:
  production: true